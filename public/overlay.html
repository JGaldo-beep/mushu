<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      :root {
        background: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
        user-select: none;
      }

      .pill {
        width: 148px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.85);
        box-shadow:
          0 18px 44px rgba(0, 0, 0, 0.36),
          inset 0 1px 0 rgba(255, 255, 255, 0.14);
      }

      .wave {
        width: 72px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
      }

      .bar {
        width: 5px;
        height: 8px;
        border-radius: 999px;
        background: #ffffff;
        opacity: 0.94;
        transform-origin: center;
        animation: sine-wave 900ms ease-in-out infinite;
      }

      .bar:nth-child(1) {
        animation-delay: -360ms;
      }

      .bar:nth-child(2) {
        animation-delay: -180ms;
      }

      .bar:nth-child(3) {
        animation-delay: 0ms;
      }

      .bar:nth-child(4) {
        animation-delay: -180ms;
      }

      .bar:nth-child(5) {
        animation-delay: -360ms;
      }

      @keyframes sine-wave {
        0%,
        100% {
          transform: scaleY(0.55);
        }

        50% {
          transform: scaleY(3.25);
        }
      }
    </style>
  </head>
  <body>
    <div class="pill" aria-label="Recording">
      <div class="wave" aria-hidden="true">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
  </body>
</html>
